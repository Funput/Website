<section class="mx-auto max-w-7xl px-4 pt-16 pb-24 sm:px-6 lg:px-8 lg:pt-24">
  <div class="grid grid-cols-1 gap-16 lg:grid-cols-12 lg:items-center">
    <!-- Hero Text -->
    <div class="lg:col-span-6 text-center lg:text-left">
      <h1 class="text-4xl font-extrabold tracking-tight text-white sm:text-5xl md:text-6xl lg:leading-tight">
        Gõ là <span class="bg-gradient-to-r from-brand-orange-500 via-brand-pink-500 to-brand-purple-500 bg-clip-text text-transparent">Fun</span>,<br />
        Input là chuẩn.
      </h1>

      <p class="mt-6 text-lg text-zinc-400 max-w-xl mx-auto lg:mx-0 leading-relaxed">
        Funput là bộ gõ tiếng Việt mã nguồn mở, siêu nhẹ và an toàn tuyệt đối. Hỗ trợ macOS, Windows và Linux với giao diện thiết kế riêng cho từng nền tảng.
      </p>

      <div class="mt-10 flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4">
        <a [href]="constants.RELEASES_URL" target="_blank" rel="noopener"
           class="w-full sm:w-auto inline-flex items-center justify-center rounded-full bg-brand-orange-500 px-8 py-4 text-base font-semibold text-white shadow-lg shadow-brand-orange-500/20 hover:bg-brand-orange-600 hover:shadow-brand-orange-600/30 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">
          Tải bản mới nhất
        </a>
        <a [href]="constants.GITHUB_URL" target="_blank" rel="noopener"
           class="w-full sm:w-auto inline-flex items-center justify-center rounded-full border border-zinc-700 bg-brand-dark-900 px-8 py-4 text-base font-semibold text-zinc-300 hover:bg-brand-dark-800 hover:text-white hover:border-zinc-600 transition-all duration-200">
          Xem mã nguồn GitHub
        </a>
      </div>
    </div>

    <!-- 3D Logo Prism -->
    <div class="lg:col-span-6">
      <div
        class="logo-prism relative mx-auto w-full max-w-md lg:max-w-none aspect-square"
        (pointermove)="onPointerMove($event)"
        (pointerleave)="onPointerLeave()"
      >
        <div
          class="prism-ambient pointer-events-none absolute inset-[6%] rounded-full bg-gradient-to-tr from-brand-orange-500/30 via-brand-pink-500/18 to-brand-purple-500/22 blur-3xl"
          aria-hidden="true"
        ></div>

        <div class="prism-scene">
          <div class="prism-rig">
            <div class="prism-tilt" [style.transform]="rigTransform()">
              <div class="prism-floor" aria-hidden="true"></div>

              <div class="prism-orbit prism-orbit--1" aria-hidden="true"></div>
              <div class="prism-orbit prism-orbit--2" aria-hidden="true"></div>
              <div class="prism-orbit prism-orbit--3" aria-hidden="true"></div>

              <div class="prism-particles" aria-hidden="true">
                @for (i of particles; track i) {
                  <span class="prism-particle" [style.--i]="i"></span>
                }
              </div>

              <!-- Depth shadow layer -->
              <svg
                viewBox="0 0 1024 1024"
                class="prism-shadow h-full w-full"
                aria-hidden="true"
              >
                <path fill="#f97316" d="M261 356C261 239 355 144 472 144H514C392 159 311 245 311 356V846C311 867 302 887 286 901C280 906 271 906 266 900C263 897 261 892 261 887V356Z" />
                <path fill="#ec4899" d="M261 548V356C261 239 355 144 472 144H856C861 144 864 148 863 153C856 249 817 313 759 346C725 366 686 362 641 362H496C391 362 303 437 261 548Z" />
                <path fill="#a855f7" d="M261 743V548C261 444 362 362 496 362H725C728 362 730 365 730 368C728 456 697 523 641 558C599 585 555 572 500 572H458C366 572 291 638 261 743Z" />
                <path fill="#38bdf8" d="M261 887V743C261 642 346 572 458 572H541C545 572 548 575 547 579C539 670 502 747 436 794C401 819 360 828 323 839C295 847 278 867 266 895C264 900 261 897 261 887Z" />
              </svg>

              <svg
                viewBox="0 0 1024 1024"
                class="prism-logo h-full w-full"
                role="img"
                aria-label="Logo Funput với hiệu ứng holographic 3D"
              >
                <defs>
                  <linearGradient id="hero-funput-top" x1="272" y1="210" x2="862" y2="327" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#FFA43F" />
                    <stop offset="0.48" stop-color="#FF5C73" />
                    <stop offset="1" stop-color="#F600A5" />
                  </linearGradient>

                  <radialGradient
                    id="hero-funput-middle"
                    cx="0"
                    cy="0"
                    r="1"
                    gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(542 518) rotate(7) scale(390 265)"
                  >
                    <stop offset="0" stop-color="#D92BFF" />
                    <stop offset="0.55" stop-color="#B600F1" />
                    <stop offset="1" stop-color="#5600D8" />
                  </radialGradient>

                  <linearGradient id="hero-funput-bottom" x1="275" y1="724" x2="548" y2="793" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#1E72FF" />
                    <stop offset="1" stop-color="#25D9F6" />
                  </linearGradient>

                  <linearGradient id="hero-funput-spine" x1="261" y1="152" x2="261" y2="897" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#FFA43F" />
                    <stop offset="0.33" stop-color="#FF4F78" />
                    <stop offset="0.62" stop-color="#9F00EE" />
                    <stop offset="1" stop-color="#1F78FF" />
                  </linearGradient>

                  <linearGradient id="hero-shimmer-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="white" stop-opacity="0" />
                    <stop offset="45%" stop-color="white" stop-opacity="0" />
                    <stop offset="50%" stop-color="white" stop-opacity="0.55" />
                    <stop offset="55%" stop-color="white" stop-opacity="0" />
                    <stop offset="100%" stop-color="white" stop-opacity="0" />
                  </linearGradient>

                  <mask id="hero-logo-mask">
                    <path fill="white" d="M261 356C261 239 355 144 472 144H514C392 159 311 245 311 356V846C311 867 302 887 286 901C280 906 271 906 266 900C263 897 261 892 261 887V356Z" />
                    <path fill="white" d="M261 548V356C261 239 355 144 472 144H856C861 144 864 148 863 153C856 249 817 313 759 346C725 366 686 362 641 362H496C391 362 303 437 261 548Z" />
                    <path fill="white" d="M261 743V548C261 444 362 362 496 362H725C728 362 730 365 730 368C728 456 697 523 641 558C599 585 555 572 500 572H458C366 572 291 638 261 743Z" />
                    <path fill="white" d="M261 887V743C261 642 346 572 458 572H541C545 572 548 575 547 579C539 670 502 747 436 794C401 819 360 828 323 839C295 847 278 867 266 895C264 900 261 897 261 887Z" />
                  </mask>

                  <filter id="hero-inner-glow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>

                <!-- Ribbon depth glow layers -->
                <path
                  class="ribbon-glow ribbon-glow--top"
                  fill="#FFA43F"
                  filter="url(#hero-inner-glow)"
                  d="M261 548V356C261 239 355 144 472 144H856C861 144 864 148 863 153C856 249 817 313 759 346C725 366 686 362 641 362H496C391 362 303 437 261 548Z"
                />
                <path
                  class="ribbon-glow ribbon-glow--middle"
                  fill="#D92BFF"
                  filter="url(#hero-inner-glow)"
                  d="M261 743V548C261 444 362 362 496 362H725C728 362 730 365 730 368C728 456 697 523 641 558C599 585 555 572 500 572H458C366 572 291 638 261 743Z"
                />
                <path
                  class="ribbon-glow ribbon-glow--bottom"
                  fill="#25D9F6"
                  filter="url(#hero-inner-glow)"
                  d="M261 887V743C261 642 346 572 458 572H541C545 572 548 575 547 579C539 670 502 747 436 794C401 819 360 828 323 839C295 847 278 867 266 895C264 900 261 897 261 887Z"
                />

                <!-- Logo ribbons -->
                <path
                  fill="url(#hero-funput-spine)"
                  d="M261 356C261 239 355 144 472 144H514C392 159 311 245 311 356V846C311 867 302 887 286 901C280 906 271 906 266 900C263 897 261 892 261 887V356Z"
                />
                <path
                  fill="url(#hero-funput-top)"
                  d="M261 548V356C261 239 355 144 472 144H856C861 144 864 148 863 153C856 249 817 313 759 346C725 366 686 362 641 362H496C391 362 303 437 261 548Z"
                />
                <path
                  fill="url(#hero-funput-middle)"
                  d="M261 743V548C261 444 362 362 496 362H725C728 362 730 365 730 368C728 456 697 523 641 558C599 585 555 572 500 572H458C366 572 291 638 261 743Z"
                />
                <path
                  fill="url(#hero-funput-bottom)"
                  d="M261 887V743C261 642 346 572 458 572H541C545 572 548 575 547 579C539 670 502 747 436 794C401 819 360 828 323 839C295 847 278 867 266 895C264 900 261 897 261 887Z"
                />

                <!-- Spine energy pulse -->
                <path
                  class="spine-glow"
                  fill="none"
                  stroke="url(#hero-funput-spine)"
                  stroke-linecap="round"
                  d="M 261 360 L 261 880"
                />

                <!-- Holographic shimmer clipped to logo -->
                <rect
                  class="prism-shimmer"
                  x="-200"
                  y="0"
                  width="1400"
                  height="1024"
                  fill="url(#hero-shimmer-gradient)"
                  mask="url(#hero-logo-mask)"
                />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
